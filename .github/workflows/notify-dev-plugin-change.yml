name: Notify Slack on dev plugin change

# Posts to Slack whenever a push to main touches the "dev" plugin.
# Requires the SLACK_DEVELOPMENT_TEAM_WEBHOOK secret (a Slack incoming webhook
# for #development-team, locked to that one channel at creation time).

on:
  push:
    branches: [main]
    paths:
      - 'plugins/dev/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed dev-plugin files
        id: changes
        run: |
          BEFORE='${{ github.event.before }}'
          AFTER='${{ github.sha }}'
          # New branch / first push: github.event.before is all-zeros — diff against the parent instead.
          if [ -z "$BEFORE" ] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            BEFORE="$AFTER^"
          fi
          all=$(git diff --name-only "$BEFORE" "$AFTER" -- 'plugins/dev/**')
          count=$(printf '%s\n' "$all" | grep -c . || true)
          # Plugin-relative paths, capped at 5 to stay short; collapse the rest into "+N more".
          files=$(printf '%s\n' "$all" | sed 's#^plugins/dev/##' | head -5 | sed 's/^/• /')
          more=$((count - 5))
          if [ "$more" -gt 0 ]; then files="$files"$'\n'"• …+$more more"; fi
          {
            echo 'files<<EOF'; echo "$files"; echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEVELOPMENT_TEAM_WEBHOOK }}
          FILES: ${{ steps.changes.outputs.files }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMPARE_URL: ${{ github.event.compare }}
        run: |
          # Compact, low-spam: linked header + subject, capped file list, update command.
          text=$(printf '🛠 <%s|*hoopit-dev* updated> — _%s_\n%s\n↻ `claude plugin update hoopit-dev@hoopit-skills`' \
            "$COMPARE_URL" "${COMMIT_MSG%%$'\n'*}" "$FILES")
          jq -n --arg text "$text" '{text: $text}' \
            | curl -sf -X POST -H 'Content-type: application/json' --data @- "$SLACK_WEBHOOK_URL"
