name: Notify Slack on dev plugin change

# Posts to Slack whenever a push to main touches the "dev" plugin.
# Requires repo secret SLACK_WEBHOOK_URL (a Slack incoming webhook, which is
# locked to a single channel at creation time).

on:
  push:
    branches: [main]
    paths:
      - 'plugins/dev/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed dev-plugin files
        id: changes
        run: |
          BEFORE='${{ github.event.before }}'
          AFTER='${{ github.sha }}'
          # New branch / first push: github.event.before is all-zeros — diff against the parent instead.
          if [ -z "$BEFORE" ] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            BEFORE="$AFTER^"
          fi
          files=$(git diff --name-only "$BEFORE" "$AFTER" -- 'plugins/dev/**' | sed 's/^/• /')
          {
            echo 'files<<EOF'
            echo "$files"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FILES: ${{ steps.changes.outputs.files }}
          PUSHER: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMPARE_URL: ${{ github.event.compare }}
        run: |
          text=$(printf '*dev* plugin changed in `%s`\nPushed by *%s*\n\n*Changed files:*\n%s\n\n_%s_\n<%s|View changes>' \
            "$GITHUB_REPOSITORY" "$PUSHER" "$FILES" "${COMMIT_MSG%%$'\n'*}" "$COMPARE_URL")
          jq -n --arg text "$text" '{text: $text}' \
            | curl -sf -X POST -H 'Content-type: application/json' --data @- "$SLACK_WEBHOOK_URL"
