name: Notify plugin change (reusable)

# Reusable core for the per-plugin Slack notifications. Each plugin has its own
# caller workflow (notify-<plugin>.yml) that filters on its path and calls this.
# Posts a compact message to #development-team via SLACK_DEVELOPMENT_TEAM_WEBHOOK.

on:
  workflow_call:
    inputs:
      plugin_name:
        description: Marketplace plugin name, e.g. hoopit-dev
        required: true
        type: string
      plugin_path:
        description: Repo path of the plugin, e.g. plugins/dev
        required: true
        type: string
      skills_from_marketplace:
        description: >-
          When true, report the added/removed entries in this plugin's skills[]
          list in .claude-plugin/marketplace.json instead of diffing files under
          plugin_path. For plugins with no plugins/<group>/ dir (e.g. picks of a
          remote repo). Posts nothing if the list is unchanged.
        required: false
        default: false
        type: boolean

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changes
        id: changes
        env:
          PLUGIN_PATH: ${{ inputs.plugin_path }}
          PLUGIN: ${{ inputs.plugin_name }}
          FROM_MARKETPLACE: ${{ inputs.skills_from_marketplace }}
        run: |
          BEFORE='${{ github.event.before }}'
          AFTER='${{ github.sha }}'
          # New branch / first push: github.event.before is all-zeros — diff against the parent instead.
          if [ -z "$BEFORE" ] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            BEFORE="$AFTER^"
          fi

          if [ "$FROM_MARKETPLACE" = "true" ]; then
            # Diff this plugin's curated skills[] list between the two commits.
            mf=.claude-plugin/marketplace.json
            sel='.plugins[]|select(.name==$n).skills[]?'
            old=$(git show "$BEFORE:$mf" 2>/dev/null | jq -r --arg n "$PLUGIN" "$sel" 2>/dev/null | sort || true)
            new=$(git show "$AFTER:$mf" | jq -r --arg n "$PLUGIN" "$sel" | sort)
            added=$(comm -13 <(printf '%s\n' "$old") <(printf '%s\n' "$new") | grep . || true)
            removed=$(comm -23 <(printf '%s\n' "$old") <(printf '%s\n' "$new") | grep . || true)
            # Strip the ./skills/ prefix; mark adds with ＋ and removes with －.
            all=$(
              { [ -n "$added" ]   && printf '%s\n' "$added"   | sed 's#^\./skills/##; s/^/＋ /'
                [ -n "$removed" ] && printf '%s\n' "$removed" | sed 's#^\./skills/##; s/^/－ /'; } || true
            )
          else
            # Plugin-relative paths of files changed under plugin_path.
            all=$(git diff --name-only "$BEFORE" "$AFTER" -- "$PLUGIN_PATH/**" \
                  | grep . | sed "s#^$PLUGIN_PATH/##; s/^/• /" || true)
          fi

          count=$(printf '%s\n' "$all" | grep -c . || true)
          # Nothing relevant changed (e.g. a marketplace.json edit that didn't touch
          # this plugin's skills) — skip the Slack post entirely.
          if [ "$count" -eq 0 ]; then echo 'skip=true' >> "$GITHUB_OUTPUT"; exit 0; fi
          # Capped at 5 to stay short; collapse the rest into "+N more".
          files=$(printf '%s\n' "$all" | head -5)
          more=$((count - 5))
          if [ "$more" -gt 0 ]; then files="$files"$'\n'"• …+$more more"; fi
          {
            echo 'files<<EOF'; echo "$files"; echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post to Slack
        if: steps.changes.outputs.skip != 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEVELOPMENT_TEAM_WEBHOOK }}
          PLUGIN: ${{ inputs.plugin_name }}
          FILES: ${{ steps.changes.outputs.files }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMPARE_URL: ${{ github.event.compare }}
        run: |
          # Compact, low-spam: linked header + subject, capped file list, update command.
          text=$(printf '🛠 <%s|*%s* updated> — _%s_\n%s\n↻ `claude plugin update %s@hoopit-skills`' \
            "$COMPARE_URL" "$PLUGIN" "${COMMIT_MSG%%$'\n'*}" "$FILES" "$PLUGIN")
          jq -n --arg text "$text" '{text: $text}' \
            | curl -sf -X POST -H 'Content-type: application/json' --data @- "$SLACK_WEBHOOK_URL"
